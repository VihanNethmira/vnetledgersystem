<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - VNET SHOP</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* පෝන් එකේ දාරවල ගෑවීම වළක්වයි */
            box-sizing: border-box;
        }

        .error-container {
            text-align: center;
            background: #1e293b;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 480px; /* ලොකු ස්ක්‍රීන් වලදී පමණක් සීමා වේ */
            border: 1px solid #334155;
            box-sizing: border-box;
        }

        .icon {
            font-size: clamp(50px, 10vw, 65px); /* ස්ක්‍රීන් එක අනුව අයිකනය විශාලත්වය වෙනස් වේ */
            color: #ef4444;
            margin-bottom: 20px;
        }

        h1 { 
            margin: 0; 
            font-size: clamp(20px, 5vw, 26px); 
            color: #f1f5f9; 
        }

        p { 
            color: #94a3b8; 
            margin: 15px 0 25px 0; 
            line-height: 1.6; 
            font-size: 15px;
        }

        .btn {
            display: block; /* මොබයිල් වලදී බටන් එක ක්ලික් කිරීමට ලේසි වීමට */
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            padding: 14px 25px;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
            font-size: 16px;
        }

        .btn:hover { 
            background-color: #1d4ed8; 
            transform: translateY(-2px);
        }

        /* කුඩා තිර සඳහා විශේෂ සැකසුම් */
        @media (max-width: 400px) {
        .error-container {
            padding: 30px 20px;}
        }

        /* --- 🔒 Forget Password Button Styles --- */
.passchange {
            margin-top: 24px;
            text-align: center;
        }

.passchange a {
            color: #94a3b8;
            font-size: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
            display: inline-block;
        }

.passchange a:hover {
            color: var(--vnet-blue);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="icon">🚫</div>
        <h1>Invalid Password</h1>
        <p>ඔබ ඇතුළත් කළ මුරපදය වැරදියි. කරුණාකර නිවැරදි මුරපදය භාවිතා කර නැවත උත්සාහ කරන්න.</p>
        <a href="/login" class="btn">Login පිටුවට යන්න</a>
        <div class="passchange"><a href="/forget-password">Reset Password? 🤔</a></div>
        <div style="margin-top: 20px; font-size: 10px; color: #475569;">
            SECURITY SYSTEM PROTECTED BY VNET
        </div>
    </div>
</body>
</html>
