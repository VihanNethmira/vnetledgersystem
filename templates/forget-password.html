<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNET - Reset Password</title>
    <style>
        :root {
            --vnet-blue: #2563eb;
            --vnet-dark: #0f172a;
            --bg-page: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --border: #e2e8f0;
        }

        body.dark-mode {
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f1f5f9;
            --border: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: 0.3s;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .reset-box {
            background: var(--bg-card);
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        h2 { margin: 0 0 10px 0; color: var(--vnet-blue); font-weight: 800; text-align: center; }
        .subtitle { font-size: 13px; color: #64748b; margin-bottom: 25px; text-align: center; }

        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; text-align: left; }
        input[type="password"] {
            padding: 12px;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: block;
            margin-bottom: 18px;
            background: var(--bg-page);
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
        }

        button {
            padding: 14px;
            background: var(--vnet-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: 0.2s;
        }

        button:hover { background: #1d4ed8; }
        
        .back-link { margin-top: 20px; text-align: center; }
        .back-link a { color: #64748b; font-size: 14px; text-decoration: none; font-weight: bold; }
        .back-link a:hover { color: var(--vnet-blue); }

        .theme-toggle {
            position: fixed; top: 20px; right: 20px; cursor: pointer;
            background: var(--bg-card); padding: 10px; border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid var(--border);
            font-size: 20px; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="theme-toggle" id="themeBtn">🌓</div>

<div class="reset-box">
    <h2>Reset Password</h2>
    <div class="subtitle">පද්ධතියේ ආරක්ෂාව සඳහා මුරපදය මාරු කරන්න</div>
    
    <form action="/forget-password" method="POST">
        <label>Current Password</label>
        <input type="password" name="current_pass" placeholder="දැනට පවතින මුරපදය" required>
        
        <label>New Password</label>
        <input type="password" name="new_pass" placeholder="නව මුරපදය" required>
        
        <label>Confirm New Password</label>
        <input type="password" name="confirm_pass" placeholder="නව මුරපදය නැවත ඇතුළත් කරන්න" required>
        
        <button type="submit">Update Password</button>
    </form>
    
    <div class="back-link">
        <a href="/login">← Back to Login</a>
    </div>
</div>

<script>
    const themeBtn = document.getElementById('themeBtn');
    const body = document.body;

    if (localStorage.getItem('theme') === 'dark-mode') {
        body.classList.add('dark-mode');
    }

    themeBtn.addEventListener('click', () => {
        body.classList.toggle('dark-mode');
        localStorage.setItem('theme', body.classList.contains('dark-mode') ? 'dark-mode' : 'light-mode');
    });
</script>

</body>
</html>
