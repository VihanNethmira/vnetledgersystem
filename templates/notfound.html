<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | VNET SHOP</title>
    <style>
    :root {
        --vnet-blue: #2563eb;
        --vnet-dark: #0a0e17;
        --vnet-light: #f4f7fe;
        --text-main: #333;
    }

    body {
        margin: 0;
        padding: 20px; /* පෝන් එකේ දාරවල ගෑවීම වළක්වයි */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: var(--vnet-light);
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: var(--text-main);
        box-sizing: border-box;
    }

    .container {
        text-align: center;
        padding: clamp(20px, 5vw, 40px); /* ස්ක්‍රීන් එක අනුව padding වෙනස් වේ */
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        max-width: 480px;
        width: 100%; /* සියලුම මොබයිල් වලට ගැලපේ */
        box-sizing: border-box;
    }

    .vnet-brand {
        font-size: 25px;
        font-weight: 800;
        color: var(--vnet-blue);
        margin-bottom: 10px;
        letter-spacing: 5px;
    }

    .error-code {
        font-size: clamp(50px, 20vw, 80px); /* මොබයිල් එකේදී අකුරු ස්වයංක්‍රීයව කුඩා වේ */
        font-weight: 900;
        color: #f1f5f9;
        line-height: 1;
        margin-bottom: 10px;
        background: linear-gradient(to bottom, #e2e8f0, #f8fafc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .content h2 {
        font-size: clamp(18px, 4vw, 24px);
        margin-bottom: 10px;
        color: #1e293b;
    }

    .content p {
        font-size: 15px;
        color: #64748b;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .btn-back {
        display: block; /* බටන් එක මුළු පළලම ගැනීමට */
        padding: 16px 20px;
        background-color: #0f172a;
        color: white;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        transition: 0.3s ease;
        border: none;
        cursor: pointer;
        width: 100%;
        box-sizing: border-box;
        font-size: 16px;
    }

    .btn-back:hover {
        background-color: var(--vnet-blue);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(37, 99, 235, 0.3);
    }

    .footer-text {
        margin-top: 30px;
        font-size: 10px;
        color: #94a3b8;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* ඉතා කුඩා තිර සඳහා (Small Phones) */
    @media (max-width: 360px) {
    .container {
        padding: 20px 15px;}
    }
</style>
</head>
<body>

    <div class="container"> 
           
        <div class="content">
            <div class="vnet-brand">VNET SHOP</div>
            <div class="error-code">404</div>
            <h2>Data Not Found</h2>
            <p>Sorry, the records for the selected month or user could not be located in our secure ledger.</p>
            
            <button onclick="window.history.back()" class="btn-back">← Go Back to Ledger</button>
            
            <div class="footer-text">VNET Ledger System 2.0</div>
        </div>
    </div>

</body>
</html>
